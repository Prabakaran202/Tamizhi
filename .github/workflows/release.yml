name: Tamizhi

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ======================================================
      # 🔨 1. Build Section
      # ======================================================
      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
          clang \
          llvm \
          llvm-dev \
          libclang-dev \
          build-essential

      - name: Build Binaries
        run: |
          gcc -Iinclude -o tamizhi \
          src/main.c \
          src/parser.c \
          src/lexer.c \
          src/ast.c \
          src/codegen.c \
          $(llvm-config --cflags --ldflags --libs core executionengine native) \
          -lstdc++

      - name: Verify Binary
        run: |
          chmod +x tamizhi
          ./tamizhi --version || true

      - name: Package Release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          mkdir -p tamizhi-$VERSION-linux

          cp tamizhi tamizhi-$VERSION-linux/

          cat > tamizhi-$VERSION-linux/install.sh << 'EOF'
          #!/bin/bash

          set -e

          sudo cp tamizhi /usr/local/bin/

          sudo chmod +x /usr/local/bin/tamizhi

          echo "✅ Tamizhi installed successfully!"
          echo ""
          echo "Usage:"
          echo "  tamizhi run hello.tz"
          echo "  tamizhi --version"
          EOF

          chmod +x tamizhi-$VERSION-linux/install.sh

          tar -czf tamizhi-$VERSION-linux.tar.gz \
          tamizhi-$VERSION-linux/

      # ======================================================
      # 📦 2. GitHub Release Section
      # ======================================================
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tamizhi-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======================================================
      # 🐍 3. PyPI Publish Section
      # ======================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel

      - name: Build Python Package
        run: |
          cd tamizhi-py
          python -m build

      - name: Publish PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd tamizhi-py
          twine upload dist/*
