name: Tamizhi

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ======================================================
      # 🔨 1. Build Section
      # ======================================================
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Build Binaries
        run: |
          gcc -o tamizhi main.c

      - name: Package Release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p tamizhi-$VERSION-linux
          cp tamizhi tamizhi-$VERSION-linux/

          cat > tamizhi-$VERSION-linux/install.sh << 'EOF'
          #!/bin/bash
          sudo cp tamizhi /usr/local/bin/
          echo "✅ Tamizhi installed successfully!"
          echo "Usage: tamizhi run <file.tz>"
          EOF

          chmod +x tamizhi-$VERSION-linux/install.sh
          tar -czf tamizhi-$VERSION-linux.tar.gz tamizhi-$VERSION-linux/

      # ======================================================
      # 📦 2. GitHub Release Section
      # ======================================================
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tamizhi-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======================================================
      # 🐍 3. PyPI Publish Section
      # ======================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python Package
        run: |
          pip install build
          python -m build

      - name: Publish PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*
