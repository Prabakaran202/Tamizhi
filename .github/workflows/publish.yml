name: Publish Tamizhi to PyPI

on:
  release:
    types: [published] # GitHub-ல் புது Release போட்டால் மட்டும் இயங்கும்

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    
    # OIDC (Trusted Publishing) வேலை செய்ய இந்த பர்மிஷன் கட்டாயம் தேவை!
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install Build Tools
      run: python -m pip install --upgrade pip build twine
      
    - name: Build the Package
      # 🚀 [FIX]: tamizhi-py ஃபோல்டருக்குள் சென்று பில்ட் செய்யுமாறு மாற்றப்பட்டுள்ளது
      run: |
        cd tamizhi-py
        python -m build
      
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # 🚀 [FIX]: பில்ட் செய்யப்பட்ட டாரெக்டரி பாதையை சரியாகக் குறிப்பிட்டுள்ளோம்
      with:
        packages-dir: tamizhi-py/dist/
        
