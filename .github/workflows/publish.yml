name: Publish Tamizhi to PyPI

on:
  release:
    types: [published] # GitHub-ல் புது Release போட்டால் மட்டும் இயங்கும்

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    
    # OIDC (Trusted Publishing) வேலை செய்ய இந்த பர்மிஷன் கட்டாயம் தேவை!
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install Build Tools
      run: python -m pip install --upgrade pip build twine
      
    - name: Build the Package
      run: python -m build
      
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # குறிப்பு: இங்கே password அல்லது token தர வேண்டியதில்லை. 
      # GitHub மற்றும் PyPI தானாகவே OIDC மூலம் சரிபார்த்துக்கொள்ளும்!
